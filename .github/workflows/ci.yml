name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests & static analysis (PHPStan ${{ matrix.dependency-versions }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dependency-versions: [lowest, highest]
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: pcov
      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependency-versions }}
      - run: composer phpstan
      - run: composer test:coverage
      - run: composer coverage:check

  mutation:
    name: Mutation testing (Infection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: pcov
      - uses: ramsey/composer-install@v4
      - run: composer infection

  hygiene:
    name: Hygiene (normalize, NEON lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - uses: ramsey/composer-install@v4
      - run: composer validate --strict
      - run: composer normalize:check
      - run: composer lint:neon
